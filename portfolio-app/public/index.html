<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0d14" />
    <meta
      name="description"
      content="Naseeruddin Shaik — Software Developer building reliable backend services in Java and Spring Boot, and typed full-stack web apps with React and TypeScript."
    />
    <meta property="og:title" content="Naseeruddin Shaik — Software Developer" />
    <meta
      property="og:description"
      content="Backend and full-stack developer. Java · Spring Boot · React · TypeScript · SQL."
    />
    <meta property="og:type" content="website" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load the fonts stylesheet non-render-blocking: fetch as 'print' (low
         priority, off the critical path) then flip to 'all' once loaded. The
         page's font-display:swap already avoids invisible text meanwhile. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <title>Naseeruddin Shaik — Software Developer</title>
    <style>
      /* Anti-flash: dark background on BODY only. Do NOT set a background on
         <html> — that stops body-background propagation to the viewport and
         paints an opaque layer over the negative-z-index effects (particles,
         aurora, beam), hiding them. */
      html,
      body {
        margin: 0;
      }
      body {
        background: #05060d;
      }
    </style>
    <script>
      // Runs before paint. Gates scroll-reveal and the intro loader, with
      // safety timers so content always appears even if the bundle fails.
      (function () {
        var d = document.documentElement;
        var reduce = false;
        try {
          reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        } catch (e) {}
        if ('IntersectionObserver' in window) d.classList.add('is-ready');
        if (!reduce) d.classList.add('intro-active');
        // Safety nets: reveal content and release the hero even if JS stalls.
        setTimeout(function () {
          d.classList.add('reveal-fallback');
        }, 4000);
        setTimeout(function () {
          d.classList.remove('intro-active');
        }, 6000);
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
